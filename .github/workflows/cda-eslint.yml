name: ESLint Code Analysis

on: [push, pull_request]

jobs:
  eslint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # required so upload-sarif can publish to the Security tab
    steps:
      # Updated from @v4 to @v5 to support newer Node runners
      - name: Checkout code
        uses: actions/checkout@v5

      # Updated from @v4 to @v5 and explicitly specifying Node 22 (LTS)
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run ESLint with SARIF output
        run: npx eslint . --format @microsoft/eslint-formatter-sarif --output-file reports/eslint-results.sarif || true

      - name: Debug ESLint Output
        run: cat reports/eslint-results.sarif || echo "No SARIF report generated"

      - name: Upload SARIF report
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/eslint-results.sarif
